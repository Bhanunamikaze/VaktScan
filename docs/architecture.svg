<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 1180" width="900" height="1180">
  <defs>
    <marker id="arr" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#58a6ff"/>
    </marker>
    <marker id="arr-dim" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#8b949e"/>
    </marker>
    <style>
      text { font-family: 'Segoe UI', Roboto, Arial, sans-serif; }
      .title    { font-size: 20px; font-weight: 700; fill: #f0f6fc; }
      .sh       { font-size: 12px; font-weight: 700; fill: #ffffff; }
      .sm       { font-size: 11px; font-weight: 600; fill: #93c5fd; }
      .sd       { font-size: 10px; fill: #8b949e; }
      .sdc      { font-size: 10px; fill: #4ade80; }
      .label    { font-size: 11px; fill: #8b949e; }
      .badge    { font-size: 10px; font-weight: 600; fill: #4ade80; }
      .output   { font-size: 11px; fill: #d2a8ff; font-family: monospace; }
    </style>
  </defs>

  <!-- background -->
  <rect width="900" height="1180" fill="#0d1117"/>

  <!-- ── TITLE ── -->
  <text x="450" y="38" text-anchor="middle" class="title">VaktScan — Attack Surface Scanner Architecture</text>

  <!-- ── INPUT ── -->
  <rect x="275" y="55" width="350" height="52" rx="8" fill="#1f6feb" stroke="#388bfd" stroke-width="1.5"/>
  <text x="450" y="77" text-anchor="middle" class="sh">Input</text>
  <text x="450" y="96" text-anchor="middle" class="sd">domain  │  IP  │  CIDR  │  targets file</text>

  <!-- INPUT → classifier -->
  <line x1="450" y1="107" x2="450" y2="127" stroke="#58a6ff" stroke-width="2" marker-end="url(#arr)"/>

  <!-- ── CLASSIFIER ── -->
  <rect x="330" y="127" width="240" height="32" rx="6" fill="#21262d" stroke="#30363d" stroke-width="1"/>
  <text x="450" y="148" text-anchor="middle" class="label">target_classifier()</text>

  <!-- fork line -->
  <line x1="450" y1="159" x2="450" y2="173" stroke="#58a6ff" stroke-width="2"/>
  <line x1="180" y1="173" x2="720" y2="173" stroke="#58a6ff" stroke-width="2"/>
  <!-- domain branch -->
  <line x1="320" y1="173" x2="320" y2="193" stroke="#58a6ff" stroke-width="2" marker-end="url(#arr)"/>
  <text x="244" y="186" class="sdc">domain</text>
  <!-- IP/CIDR branch label -->
  <line x1="620" y1="173" x2="620" y2="620" stroke="#8b949e" stroke-width="1.5" stroke-dasharray="5,3"/>
  <text x="625" y="186" class="label">IP / CIDR</text>
  <text x="625" y="200" class="label">(skip Stage 1)</text>

  <!-- ══════════════════════════════════════════════════════ -->
  <!-- STAGE 1                                               -->
  <!-- ══════════════════════════════════════════════════════ -->
  <rect x="30" y="193" width="560" height="210" rx="8" fill="#0c1a2e" stroke="#1d4ed8" stroke-width="1.5"/>
  <!-- header -->
  <rect x="30" y="193" width="560" height="26" rx="8" fill="#1d4ed8"/>
  <rect x="30" y="207" width="560" height="12" fill="#1d4ed8"/>
  <text x="310" y="211" text-anchor="middle" class="sh">Stage 1 — Passive Recon</text>
  <text x="480" y="211" text-anchor="middle" class="badge">all parallel</text>

  <!-- box 1: Subdomain Enum + Google Dork -->
  <rect x="44" y="228" width="150" height="88" rx="5" fill="#0f2d52" stroke="#1e40af" stroke-width="1"/>
  <text x="119" y="246" text-anchor="middle" class="sm">Subdomain Enum</text>
  <text x="119" y="259" text-anchor="middle" class="sd">subfinder / amass</text>
  <text x="119" y="271" text-anchor="middle" class="sd">bbot / findomain</text>
  <text x="119" y="283" text-anchor="middle" class="sd">crt.sh / knockpy</text>
  <line x1="44" y1="296" x2="194" y2="296" stroke="#1e40af" stroke-width="1"/>
  <text x="119" y="308" text-anchor="middle" class="sm">Google Dork</text>

  <!-- box 2: DNS Recon -->
  <rect x="204" y="228" width="132" height="88" rx="5" fill="#0f2d52" stroke="#1e40af" stroke-width="1"/>
  <text x="270" y="246" text-anchor="middle" class="sm">DNS Recon</text>
  <text x="270" y="259" text-anchor="middle" class="sd">SPF / DMARC</text>
  <text x="270" y="271" text-anchor="middle" class="sd">DKIM / AXFR</text>
  <text x="270" y="283" text-anchor="middle" class="sd">DNSSEC / CAA</text>
  <text x="270" y="296" text-anchor="middle" class="sd">open recursion</text>
  <text x="270" y="309" text-anchor="middle" class="sd">zone transfer</text>

  <!-- box 3: Cloud Enum -->
  <rect x="346" y="228" width="132" height="88" rx="5" fill="#0f2d52" stroke="#1e40af" stroke-width="1"/>
  <text x="412" y="246" text-anchor="middle" class="sm">Cloud Enum</text>
  <text x="412" y="259" text-anchor="middle" class="sd">S3 bucket enum</text>
  <text x="412" y="271" text-anchor="middle" class="sd">Azure Blob enum</text>
  <text x="412" y="283" text-anchor="middle" class="sd">GCS enum</text>
  <text x="412" y="296" text-anchor="middle" class="sd">CloudFront detect</text>
  <text x="412" y="309" text-anchor="middle" class="sd">metadata SSRF</text>

  <!-- box 4: CT Monitor -->
  <rect x="488" y="228" width="90" height="88" rx="5" fill="#0f2d52" stroke="#1e40af" stroke-width="1"/>
  <text x="533" y="246" text-anchor="middle" class="sm">CT Monitor</text>
  <text x="533" y="262" text-anchor="middle" class="sd">crt.sh query</text>
  <text x="533" y="275" text-anchor="middle" class="sd">SQLite baseline</text>
  <text x="533" y="288" text-anchor="middle" class="sd">diff detection</text>
  <text x="533" y="301" text-anchor="middle" class="sd">new cert alert</text>
  <text x="533" y="315" text-anchor="middle" class="sdc">HIGH on change</text>

  <!-- parallel brace label -->
  <text x="310" y="392" text-anchor="middle" class="sd">asyncio.gather — all five run concurrently</text>

  <!-- Stage 1 → Stage 2 -->
  <line x1="310" y1="403" x2="310" y2="428" stroke="#58a6ff" stroke-width="2" marker-end="url(#arr)"/>
  <!-- IP dashed joins here -->
  <line x1="620" y1="620" x2="620" y2="435" stroke="#8b949e" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arr-dim)"/>

  <!-- ══════════════════════════════════════════════════════ -->
  <!-- STAGE 2                                               -->
  <!-- ══════════════════════════════════════════════════════ -->
  <rect x="30" y="428" width="660" height="140" rx="8" fill="#0c1a2e" stroke="#7c3aed" stroke-width="1.5"/>
  <rect x="30" y="428" width="660" height="26" rx="8" fill="#7c3aed"/>
  <rect x="30" y="442" width="660" height="12" fill="#7c3aed"/>
  <text x="360" y="446" text-anchor="middle" class="sh">Stage 2 — Active Discovery</text>

  <!-- Port Scanner -->
  <rect x="50" y="464" width="190" height="50" rx="5" fill="#1e1b4b" stroke="#7c3aed" stroke-width="1"/>
  <text x="145" y="484" text-anchor="middle" class="sm">Port Scanner</text>
  <text x="145" y="498" text-anchor="middle" class="sd">200 ports default · --ports to extend</text>
  <text x="145" y="511" text-anchor="middle" class="sd">IPv4 + IPv6 · streaming for large CIDRs</text>

  <!-- Nmap optional -->
  <rect x="260" y="464" width="180" height="50" rx="5" fill="#1e1b4b" stroke="#6b21a8" stroke-width="1" stroke-dasharray="4,2"/>
  <text x="350" y="481" text-anchor="middle" class="sm">Nmap CVE Scan</text>
  <text x="350" y="494" text-anchor="middle" class="sd">--nmap flag · -sCV --script</text>
  <text x="350" y="507" text-anchor="middle" class="sd">vuln,vulners · XML parse</text>
  <text x="350" y="521" text-anchor="middle" class="label">(optional)</text>

  <!-- HTTPX -->
  <rect x="460" y="464" width="210" height="50" rx="5" fill="#1e1b4b" stroke="#7c3aed" stroke-width="1"/>
  <text x="565" y="484" text-anchor="middle" class="sm">HTTPX Probe</text>
  <text x="565" y="498" text-anchor="middle" class="sd">title · status · tech detect</text>
  <text x="565" y="511" text-anchor="middle" class="sd">→ alive URLs list</text>

  <!-- arrows inside stage 2 -->
  <line x1="240" y1="489" x2="258" y2="489" stroke="#7c3aed" stroke-width="1.5" stroke-dasharray="3,2" marker-end="url(#arr)"/>
  <line x1="240" y1="489" x2="458" y2="489" stroke="#58a6ff" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Stage 2 → Stage 3 -->
  <line x1="360" y1="568" x2="360" y2="598" stroke="#58a6ff" stroke-width="2" marker-end="url(#arr)"/>

  <!-- ══════════════════════════════════════════════════════ -->
  <!-- STAGE 3                                               -->
  <!-- ══════════════════════════════════════════════════════ -->
  <rect x="30" y="598" width="660" height="195" rx="8" fill="#0c2218" stroke="#166534" stroke-width="1.5"/>
  <rect x="30" y="598" width="660" height="26" rx="8" fill="#166534"/>
  <rect x="30" y="612" width="660" height="12" fill="#166534"/>
  <text x="310" y="616" text-anchor="middle" class="sh">Stage 3 — Web Analysis (alive URLs)</text>
  <text x="575" y="616" text-anchor="middle" class="badge">all parallel</text>

  <!-- 5 parallel web boxes -->
  <!-- Nuclei -->
  <rect x="42" y="634" width="116" height="80" rx="4" fill="#052e16" stroke="#166534" stroke-width="1"/>
  <text x="100" y="652" text-anchor="middle" class="sm">Nuclei</text>
  <text x="100" y="665" text-anchor="middle" class="sd">CVE templates</text>
  <text x="100" y="678" text-anchor="middle" class="sd">auto-sync</text>
  <text x="100" y="691" text-anchor="middle" class="sd">7000+ templates</text>
  <text x="100" y="705" text-anchor="middle" class="sdc">findings</text>

  <!-- Web Checks -->
  <rect x="166" y="634" width="116" height="80" rx="4" fill="#052e16" stroke="#166534" stroke-width="1"/>
  <text x="224" y="652" text-anchor="middle" class="sm">Web Checks</text>
  <text x="224" y="665" text-anchor="middle" class="sd">.git/.env expose</text>
  <text x="224" y="678" text-anchor="middle" class="sd">admin panels</text>
  <text x="224" y="691" text-anchor="middle" class="sd">dir listing</text>
  <text x="224" y="705" text-anchor="middle" class="sd">sec headers</text>

  <!-- Domain Scan -->
  <rect x="290" y="634" width="116" height="80" rx="4" fill="#052e16" stroke="#166534" stroke-width="1"/>
  <text x="348" y="652" text-anchor="middle" class="sm">Domain Scan</text>
  <text x="348" y="665" text-anchor="middle" class="sd">58-sig takeover</text>
  <text x="348" y="678" text-anchor="middle" class="sd">CORS / headers</text>
  <text x="348" y="691" text-anchor="middle" class="sd">parked detect</text>
  <text x="348" y="705" text-anchor="middle" class="sd">classification</text>

  <!-- Dirsearch -->
  <rect x="414" y="634" width="116" height="80" rx="4" fill="#052e16" stroke="#166534" stroke-width="1"/>
  <text x="472" y="652" text-anchor="middle" class="sm">Dirsearch</text>
  <text x="472" y="665" text-anchor="middle" class="sd">dir brute-force</text>
  <text x="472" y="678" text-anchor="middle" class="sd">backup files</text>
  <text x="472" y="691" text-anchor="middle" class="sd">config leaks</text>
  <text x="472" y="705" text-anchor="middle" class="sd">wordlist scan</text>

  <!-- JS Paths -->
  <rect x="538" y="634" width="140" height="80" rx="4" fill="#052e16" stroke="#166534" stroke-width="1"/>
  <text x="608" y="652" text-anchor="middle" class="sm">JS Paths</text>
  <text x="608" y="665" text-anchor="middle" class="sd">secrets / API keys</text>
  <text x="608" y="678" text-anchor="middle" class="sd">source maps</text>
  <text x="608" y="691" text-anchor="middle" class="sd">internal IPs</text>
  <text x="608" y="705" text-anchor="middle" class="sd">endpoint probe</text>

  <!-- GAU + Wayback row (domain only) -->
  <rect x="42" y="726" width="240" height="50" rx="4" fill="#052e16" stroke="#14532d" stroke-width="1"/>
  <text x="162" y="744" text-anchor="middle" class="sm">GAU</text>
  <text x="162" y="758" text-anchor="middle" class="sd">archived URL harvest</text>
  <text x="162" y="770" text-anchor="middle" class="sd">→ passive endpoint list</text>

  <rect x="292" y="726" width="240" height="50" rx="4" fill="#052e16" stroke="#14532d" stroke-width="1"/>
  <text x="412" y="744" text-anchor="middle" class="sm">WaybackURLs</text>
  <text x="412" y="758" text-anchor="middle" class="sd">Wayback Machine harvest</text>
  <text x="412" y="770" text-anchor="middle" class="sd">→ passive endpoint list</text>

  <text x="560" y="754" text-anchor="start" class="sd">(domain targets only,</text>
  <text x="560" y="768" text-anchor="start" class="sd"> both in parallel)</text>

  <!-- Stage 3 → Stage 4 -->
  <line x1="360" y1="793" x2="360" y2="823" stroke="#58a6ff" stroke-width="2" marker-end="url(#arr)"/>

  <!-- ══════════════════════════════════════════════════════ -->
  <!-- STAGE 4                                               -->
  <!-- ══════════════════════════════════════════════════════ -->
  <rect x="30" y="823" width="660" height="120" rx="8" fill="#1a0c0c" stroke="#991b1b" stroke-width="1.5"/>
  <rect x="30" y="823" width="660" height="26" rx="8" fill="#991b1b"/>
  <rect x="30" y="837" width="660" height="12" fill="#991b1b"/>
  <text x="310" y="841" text-anchor="middle" class="sh">Stage 4 — Service Vulnerability Scanning (per open port, parallel)</text>

  <text x="350" y="870" text-anchor="middle" class="sm">elastic · kibana · grafana · prometheus · cpanel · jenkins · aem</text>
  <text x="350" y="886" text-anchor="middle" class="sd">service_recon: Redis · SMB · RMI · Docker API · etcd · Kubernetes · MongoDB</text>
  <text x="350" y="900" text-anchor="middle" class="sd">Cassandra · RabbitMQ · Vault · TeamCity CVE-2024-27198 · IPMI · Jupyter · Hadoop YARN · ...</text>
  <text x="350" y="918" text-anchor="middle" class="sdc">fingerprint guard — service confirmed by headers/body before probe</text>
  <text x="350" y="932" text-anchor="middle" class="sd">30+ CVE checks across 79 port mappings</text>

  <!-- Stage 4 → Stage 5 -->
  <line x1="360" y1="943" x2="360" y2="973" stroke="#58a6ff" stroke-width="2" marker-end="url(#arr)"/>

  <!-- ══════════════════════════════════════════════════════ -->
  <!-- STAGE 5                                               -->
  <!-- ══════════════════════════════════════════════════════ -->
  <rect x="30" y="973" width="660" height="110" rx="8" fill="#12101e" stroke="#6d28d9" stroke-width="1.5"/>
  <rect x="30" y="973" width="660" height="26" rx="8" fill="#6d28d9"/>
  <rect x="30" y="987" width="660" height="12" fill="#6d28d9"/>
  <text x="310" y="991" text-anchor="middle" class="sh">Stage 5 — Enrichment</text>
  <text x="510" y="991" text-anchor="middle" class="badge">parallel</text>

  <!-- 4 enrichment boxes -->
  <rect x="44"  y="1009" width="143" height="56" rx="4" fill="#1e0a3c" stroke="#6d28d9" stroke-width="1"/>
  <text x="115" y="1027" text-anchor="middle" class="sm">CISA KEV</text>
  <text x="115" y="1042" text-anchor="middle" class="sd">Known Exploited</text>
  <text x="115" y="1056" text-anchor="middle" class="sd">Vulnerabilities flag</text>

  <rect x="197" y="1009" width="143" height="56" rx="4" fill="#1e0a3c" stroke="#6d28d9" stroke-width="1"/>
  <text x="268" y="1027" text-anchor="middle" class="sm">EPSS</text>
  <text x="268" y="1042" text-anchor="middle" class="sd">exploit probability</text>
  <text x="268" y="1056" text-anchor="middle" class="sd">score per CVE</text>

  <rect x="350" y="1009" width="143" height="56" rx="4" fill="#1e0a3c" stroke="#6d28d9" stroke-width="1"/>
  <text x="421" y="1027" text-anchor="middle" class="sm">NVD CVE Lookup</text>
  <text x="421" y="1042" text-anchor="middle" class="sd">banner → CPE → CVE</text>
  <text x="421" y="1056" text-anchor="middle" class="sd">CVSS ≥ 7 filter</text>

  <rect x="503" y="1009" width="175" height="56" rx="4" fill="#1e0a3c" stroke="#6d28d9" stroke-width="1"/>
  <text x="590" y="1027" text-anchor="middle" class="sm">Passive Intel</text>
  <text x="590" y="1042" text-anchor="middle" class="sd">Shodan + Censys</text>
  <text x="590" y="1056" text-anchor="middle" class="sd">host enrichment</text>

  <!-- Stage 5 → Output -->
  <line x1="360" y1="1083" x2="360" y2="1110" stroke="#58a6ff" stroke-width="2" marker-end="url(#arr)"/>

  <!-- ══════════════════════════════════════════════════════ -->
  <!-- OUTPUT                                                -->
  <!-- ══════════════════════════════════════════════════════ -->
  <rect x="130" y="1110" width="520" height="58" rx="8" fill="#161b22" stroke="#30363d" stroke-width="1.5"/>
  <text x="390" y="1130" text-anchor="middle" class="output">reports/&lt;target&gt;_&lt;YYYYMMDD_HHMMSS&gt;/</text>
  <text x="390" y="1148" text-anchor="middle" class="sd">scan_results_*.csv  ·  scan_results_*.json  ·  scan_results_*.sarif  ·  portscan_*.csv</text>

</svg>
